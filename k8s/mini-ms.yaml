apiVersion: v1
kind: Namespace
metadata:
  name: mini-ms
---
# ===== Frontend =====
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: mini-ms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: mini-ms-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: ID_SERVICE_HOST
          value: "id-service.mini-ms.svc.cluster.local"
        - name: ID_SERVICE_PORT
          value: "80"
        - name: ATTEND_SERVICE_HOST
          value: "attend-service.mini-ms.svc.cluster.local"
        - name: ATTEND_SERVICE_PORT
          value: "80"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: mini-ms
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 8080
    nodePort: 30080
---
# ===== ID Service =====
apiVersion: apps/v1
kind: Deployment
metadata:
  name: id-service
  namespace: mini-ms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: id-service
  template:
    metadata:
      labels:
        app: id-service
    spec:
      containers:
      - name: id-service
        image: mini-ms-id-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: DATA_FILE
          value: "data/ids.json"
---
apiVersion: v1
kind: Service
metadata:
  name: id-service
  namespace: mini-ms
spec:
  type: ClusterIP
  selector:
    app: id-service
  ports:
  - port: 80
    targetPort: 8080
---
# ===== Attend Service =====
apiVersion: apps/v1
kind: Deployment
metadata:
  name: attend-service
  namespace: mini-ms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: attend-service
  template:
    metadata:
      labels:
        app: attend-service
    spec:
      containers:
      - name: attend-service
        image: mini-ms-attend-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: DATA_FILE
          value: "data/attendance.json"
---
apiVersion: v1
kind: Service
metadata:
  name: attend-service
  namespace: mini-ms
spec:
  type: ClusterIP
  selector:
    app: attend-service
  ports:
  - port: 80
    targetPort: 8080
